		.price{font-weight:800;color:#0f172a}

		.mobile-cta{position:fixed;left:0;right:0;bottom:0;display:flex;gap:8px;padding:12px;background:#fff;border-top:1px solid #e6eef6}
		.mobile-cta a{flex:1;padding:10px;border-radius:8px;text-align:center;text-decoration:none;font-weight:800}
		.mobile-cta .tel{background:#111;color:#fff}
